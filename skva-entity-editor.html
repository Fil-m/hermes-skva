<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SKVA Entity Schema Editor</title>
<script>
let schema = {entities:{}};
let dragEntity = null;

function addEntity(){showModal(null)}
function addProp(entityId){showPropModal(entityId,null)}
function addRelation(entityId){showRelModal(entityId,null)}
function deleteEntity(id){delete schema.entities[id];render()}
function deleteProp(eid,pid){delete schema.entities[eid].props[pid];render()}
function deleteRel(eid,rid){
  const e=schema.entities[eid];
  if(e) e.relations=e.relations.filter(r=>r.name!==rid);
  render()
}

function showModal(e){
  const m=document.getElementById('entityModal');
  m.style.display='block';
  m.dataset.edit=e||'';
  document.getElementById('entityName').value=e||'';
  if(e && schema.entities[e]){
    const ed=schema.entities[e];
    document.getElementById('entityName').value=e;
  }
}

function saveEntity(){
  const m=document.getElementById('entityModal');
  const oldName=m.dataset.edit;
  const newName=document.getElementById('entityName').value.trim();
  if(!newName) return;
  if(oldName && oldName!==newName){
    schema.entities[newName]=schema.entities[oldName];
    delete schema.entities[oldName];
    // Update relations in other entities
    for(const[ek,ev] of Object.entries(schema.entities)){
      ev.relations=ev.relations.map(r=>r.entity===oldName?{...r,entity:newName}:r);
    }
  }
  if(!schema.entities[newName]){
    schema.entities[newName]={props:{},relations:[]};
  }
  m.style.display='none';
  render();
}

function showPropModal(eid,pid){
  const m=document.getElementById('propModal');
  m.style.display='block';
  m.dataset.entity=eid;
  m.dataset.edit=pid||'';
  document.getElementById('propName').value=pid||'';
  document.getElementById('propType').value=schema.entities[eid]?.props[pid]||'string';
}

function saveProp(){
  const m=document.getElementById('propModal');
  const eid=m.dataset.entity;
  const oldP=m.dataset.edit;
  const newP=document.getElementById('propName').value.trim();
  const typ=document.getElementById('propType').value;
  if(!newP||!eid) return;
  if(oldP && oldP!==newP) delete schema.entities[eid].props[oldP];
  schema.entities[eid].props[newP]=typ;
  m.style.display='none';
  render();
}

function showRelModal(eid,rid){
  const m=document.getElementById('relModal');
  m.style.display='block';
  m.dataset.entity=eid;
  m.dataset.edit=rid||'';
  document.getElementById('relName').value=rid||'';
  document.getElementById('relType').value='has_many';
  document.getElementById('relTarget').value='';
  if(rid && schema.entities[eid]){
    const r=schema.entities[eid].relations.find(x=>x.name===rid);
    if(r){
      document.getElementById('relName').value=rid;
      document.getElementById('relType').value=r.type;
      document.getElementById('relTarget').value=r.entity;
    }
  }
  // Fill target dropdown
  const sel=document.getElementById('relTarget');
  sel.innerHTML='';
  for(const ek of Object.keys(schema.entities)){
    if(ek!==eid){
      const opt=document.createElement('option');
      opt.value=ek;opt.textContent=ek;
      sel.appendChild(opt);
    }
  }
}

function saveRel(){
  const m=document.getElementById('relModal');
  const eid=m.dataset.entity;
  const oldR=m.dataset.edit;
  const newR=document.getElementById('relName').value.trim();
  const typ=document.getElementById('relType').value;
  const target=document.getElementById('relTarget').value;
  if(!newR||!eid||!target) return;
  const e=schema.entities[eid];
  if(oldR) e.relations=e.relations.filter(r=>r.name!==oldR);
  e.relations.push({name:newR,type:typ,entity:target});
  m.style.display='none';
  render();
}

function exportYAML(){
  let y='# SKVA Entity Schema\nentities:\n';
  for(const[ek,ev] of Object.entries(schema.entities)){
    y+=`  ${ek}:\n    props:\n`;
    for(const[pk,pv] of Object.entries(ev.props)){
      y+=`      ${pk}: ${pv}\n`;
    }
    if(ev.relations.length){
      y+=`    relations:\n`;
      for(const r of ev.relations){
        y+=`      - name: ${r.name}\n        type: ${r.type}\n        entity: ${r.entity}\n`;
      }
    }
  }
  document.getElementById('yamlOutput').textContent=y;
  document.getElementById('yamlPanel').style.display='block';
}

function downloadYAML(){
  const el=document.getElementById('yamlOutput');
  const blob=new Blob([el.textContent],{type:'text/yaml'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='entity-schema.yaml';
  a.click();
}

function closeModals(){
  document.querySelectorAll('.modal').forEach(m=>m.style.display='none');
}

function render(){
  const container=document.getElementById('schemaContainer');
  container.innerHTML='';
  const entities=Object.entries(schema.entities);
  for(const[ek,ev] of entities){
    const card=document.createElement('div');
    card.className='entity-card';
    card.draggable=true;
    card.dataset.entity=ek;
    
    let html=`<div class="entity-header">
      <span class="entity-title" onclick="showModal('${ek}')">⬡ ${ek}</span>
      <span class="entity-actions">
        <button onclick="addProp('${ek}')" title="Add property">+p</button>
        <button onclick="addRelation('${ek}')" title="Add relation">+r</button>
        <button onclick="deleteEntity('${ek}')" class="del">×</button>
      </span>
    </div><div class="entity-body">`;
    
    if(Object.keys(ev.props).length){
      html+=`<div class="section-title">Properties</div>`;
      for(const[pk,pv] of Object.entries(ev.props)){
        html+=`<div class="prop-row">
          <span class="prop-name">${pk}</span>
          <span class="prop-type">${pv}</span>
          <span class="prop-del" onclick="deleteProp('${ek}','${pk}')">×</span>
        </div>`;
      }
    }
    
    if(ev.relations.length){
      html+=`<div class="section-title">Relations</div>`;
      for(const r of ev.relations){
        const connected=document.querySelector(`[data-entity="${r.entity}"]`);
        const color=connected?'#64b5f6':'#888';
        html+=`<div class="rel-row">
          <span style="color:${color}">${r.type}</span>
          <span style="color:${color}">→ ${r.entity}</span>
          <span class="prop-del" onclick="deleteRel('${ek}','${r.name}')">×</span>
        </div>`;
      }
    }
    
    html+=`</div>`;
    card.innerHTML=html;
    
    card.addEventListener('dragstart',()=>dragEntity=ek);
    card.addEventListener('dragover',(e)=>e.preventDefault());
    card.addEventListener('drop',function(e){
      e.preventDefault();
      if(dragEntity && dragEntity!==ek){
        // Add relation between dragged and dropped
        const dragged=schema.entities[dragEntity];
        if(dragged){
          // Check if relation already exists
          const exists=dragged.relations.some(r=>r.entity===ek);
          if(!exists){
            dragged.relations.push({name:`${dragEntity}_to_${ek}`,type:'has_many',entity:ek});
            render();
          }
        }
      }
      dragEntity=null;
    });
    
    container.appendChild(card);
  }
}

async function loadTZ(){
  // We'll load from a preset for Habitat OS
  schema=loadPreset();
  render();
}

function loadPreset(){
  return {
    entities:{
      User:{props:{evo:{type:'int',default:0},gold:{type:'int',default:100},skin:{type:'string[]'}},relations:[{name:'owns',type:'has_many',entity:'Canvas'}]},
      Canvas:{props:{id:'string',name:'string',type:{type:'enum',values:['16x16','32x32']},pixels:{type:'Pixel[]'}},relations:[]},
      Pixel:{props:{color:'string',x:'int',y:'int',timestamp:{type:'int',desc:'creation time'},lifetime:{type:'enum',values:['1h','6h','24h','7d','infinite']},owner:'string'},relations:[{name:'belongs_to',type:'belongs_to',entity:'User'},{name:'on_canvas',type:'belongs_to',entity:'Canvas'}]},
      Engine:{props:{id:'string',name:'string',type:{type:'enum',values:['quest','animate','arcade','platformer','3d']},unlocked:'bool'},relations:[{name:'uses_canvas',type:'has_one',entity:'Canvas'}]},
      Skin:{props:{id:'string',name:'string',price_gold:'int',price_evo:'int'},relations:[{name:'owned_by',type:'belongs_to',entity:'User'}]}
    }
  };
}
</script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0e1a;color:#e0e0e0;font-family:system-ui;padding:20px;min-height:100vh}
h1{color:#90caf9;text-align:center;margin-bottom:20px;font-size:24px}
.toolbar{display:flex;gap:10px;justify-content:center;margin-bottom:20px;flex-wrap:wrap}
.btn{background:#1a1f2e;color:#e0e0e0;border:1px solid #333;padding:8px 16px;border-radius:6px;cursor:pointer;font-size:14px}
.btn:hover{background:#2a2f3e}
.btn-primary{background:#1565c0;border-color:#1565c0}
.btn-primary:hover{background:#1976d2}
.btn-danger{background:#b71c1c;border-color:#b71c1c}
#schemaContainer{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.entity-card{background:#111827;border:1px solid #1e293b;border-radius:8px;padding:0;cursor:grab}
.entity-header{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:#1a2332;border-radius:8px 8px 0 0}
.entity-title{cursor:pointer;font-weight:600;color:#64b5f6}
.entity-actions{display:flex;gap:4px}
.entity-actions button{background:0;border:1px solid #333;color:#e0e0e0;border-radius:4px;padding:2px 6px;cursor:pointer;font-size:11px}
.entity-actions button.del{color:#ef5350;border-color:#ef5350}
.entity-body{padding:8px 12px 12px}
.section-title{font-size:11px;color:#888;text-transform:uppercase;margin:6px 0 4px}
.prop-row,.rel-row{display:flex;justify-content:space-between;align-items:center;padding:3px 0;font-size:13px;border-bottom:1px solid #1a1a2e}
.prop-name{color:#ccc}
.prop-type{color:#666;font-size:12px}
.prop-del{color:#ef5350;cursor:pointer;font-size:14px;padding:0 4px;display:none}
.prop-row:hover .prop-del,.rel-row:hover .prop-del{display:inline}
/* Modal */
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:100}
.modal-content{background:#1a2332;margin:15% auto;padding:20px;border:1px solid #333;width:320px;border-radius:8px}
.modal-content h3{color:#90caf9;margin-bottom:12px}
.modal-content label{display:block;color:#aaa;font-size:12px;margin:8px 0 4px}
.modal-content input,.modal-content select{width:100%;padding:6px 10px;background:#111827;border:1px solid #333;color:#e0e0e0;border-radius:4px;font-size:14px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:12px}
#yamlPanel{display:none;margin-top:20px}
#yamlOutput{background:#111827;border:1px solid #333;border-radius:8px;padding:16px;color:#ccc;font-family:monospace;font-size:13px;white-space:pre;overflow-x:auto;max-height:400px}
.close{cursor:pointer;float:right;color:#888;font-size:20px}
.close:hover{color:#fff}
</style>
</head>
<body>
<h1>⬡ SKVA Entity Schema Editor</h1>
<div class="toolbar">
  <button class="btn btn-primary" onclick="addEntity()">+ Entity</button>
  <button class="btn" onclick="loadTZ()">Load Habitat OS</button>
  <button class="btn" onclick="exportYAML()">Export YAML</button>
  <button class="btn" onclick="downloadYAML()">Download</button>
</div>
<div id="schemaContainer"></div>

<div id="yamlPanel">
  <h3 style="color:#90caf9;margin-top:20px">📄 YAML Output</h3>
  <pre id="yamlOutput"></pre>
</div>

<!-- Entity Modal -->
<div id="entityModal" class="modal" onclick="if(event.target===this)closeModals()">
  <div class="modal-content">
    <span class="close" onclick="closeModals()">&times;</span>
    <h3>Entity</h3>
    <label>Name</label>
    <input id="entityName" placeholder="e.g. Pixel">
    <div class="modal-actions">
      <button class="btn" onclick="closeModals()">Cancel</button>
      <button class="btn btn-primary" onclick="saveEntity()">Save</button>
    </div>
  </div>
</div>

<!-- Property Modal -->
<div id="propModal" class="modal" onclick="if(event.target===this)closeModals()">
  <div class="modal-content">
    <span class="close" onclick="closeModals()">&times;</span>
    <h3>Property</h3>
    <label>Name</label>
    <input id="propName" placeholder="e.g. color">
    <label>Type</label>
    <select id="propType">
      <option>string</option><option>int</option><option>float</option><option>bool</option>
      <option>timestamp</option><option>json</option>
    </select>
    <div class="modal-actions">
      <button class="btn" onclick="closeModals()">Cancel</button>
      <button class="btn btn-primary" onclick="saveProp()">Save</button>
    </div>
  </div>
</div>

<!-- Relation Modal -->
<div id="relModal" class="modal" onclick="if(event.target===this)closeModals()">
  <div class="modal-content">
    <span class="close" onclick="closeModals()">&times;</span>
    <h3>Relation</h3>
    <label>Type</label>
    <select id="relType">
      <option>belongs_to</option><option>has_one</option><option>has_many</option><option>owns</option>
    </select>
    <label>Target Entity</label>
    <select id="relTarget"></select>
    <div class="modal-actions">
      <button class="btn" onclick="closeModals()">Cancel</button>
      <button class="btn btn-primary" onclick="saveRel()">Save</button>
    </div>
  </div>
</div>
</body>
</html>
